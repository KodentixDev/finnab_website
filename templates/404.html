{% load static %}
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finnab - Səhifə Tapılmadı</title>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" media="screen">
    <link href="{% static 'css/slicknav.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/swiper-bundle.min.css' %}">
    <link href="{% static 'css/all.css' %}" rel="stylesheet" media="screen">
    <link href="{% static 'css/animate.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/magnific-popup.css' %}">
    <link href="{% static 'css/custom.css' %}" rel="stylesheet" media="screen">
</head>

<body class="tt-magic-cursor">

    <div class="preloader">
        <div class="loading-container">
            <div class="loading"></div>
            <div id="loading-icon"><img src="{% static 'images/loader.svg' %}" alt=""></div>
        </div>
    </div>

    <div id="magic-cursor">
        <div id="ball"><div class="circle"></div></div>
    </div>

    <header class="main-header">
        <div class="header-sticky">
            <nav class="navbar navbar-expand-lg">
                <div class="container">
                    <a class="navbar-brand" href="{% url 'home' %}">
                        <img src="{% static 'images/logo.png' %}" style="max-width: 150px;" alt="Logo">
                    </a>
                    <div class="collapse navbar-collapse main-menu">
                        <div class="nav-menu-wrapper">
                            <ul class="navbar-nav mr-auto" id="menu">
                                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#home">Ana Səhifə</a></li>
                                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#about">Haqqımızda</a></li>
                                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#services">Xidmətlər</a></li>
                                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#faq">FAQ</a></li>
                                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#contact">Əlaqə</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="navbar-toggle"></div>
                </div>
            </nav>
            <div class="responsive-menu"></div>
        </div>
    </header>

    <div class="page-header light-bg-section" style="margin-top: 60px;">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="page-header-box">
                        <h1 class="text-anime-style-3">Səhifə Tapılmadı!</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="error-page">
        <div class="container">
            <div class="row">
                <div class="error-page-image wow fadeInUp" data-wow-delay="0.25s">
                    <img src="{% static 'images/404-error-img.png' %}" alt="">
                </div>
                <div class="error-page-content">
                    <div class="error-page-content-heading">
                        <h2 class="text-anime-style-3">Üzr istəyirik, axtardığınız səhifə tapılmadı</h2>
                    </div>
                    <a class="btn-default wow fadeInUp" data-wow-delay="0.25s" href="{% url 'home' %}">Ana Səhifəyə Qayıt</a>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/jquery.slicknav.js' %}"></script>
    <script src="{% static 'js/gsap.min.js' %}"></script>
    <script src="{% static 'js/magiccursor.js' %}"></script>
    <script src="{% static 'js/SplitText.js' %}"></script>
    <script src="{% static 'js/ScrollTrigger.min.js' %}"></script>
    <script src="{% static 'js/wow.js' %}"></script>
    <script src="{% static 'js/function.js' %}"></script>
</body>
</html>
